<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translate PDF - PDFSmart Tools</title>

    <link rel="stylesheet" href="tools-common.css">
    <link rel="stylesheet" href="translate-pdf.css?v=20">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v5/dist/tesseract.min.js"></script>
</head>
<body>

<header class="topbar">
    <div class="logo">📄 PDFSmart Tools</div>
    <a href="index.html" class="home-btn">← Back to Home</a>
</header>

<section class="tool-layout">

    <div class="tool-card">

        <div id="uploadSection" class="upload-section">
            <h1>Translate PDF</h1>
            <p>Select PDF, extract text using OCR and translate basic words.</p>

            <label for="pdfFile" class="upload-area">
                <div class="upload-icon">🌐</div>
                <h2>Choose PDF File</h2>
                <p>Select one PDF file</p>
            </label>

            <input type="file" id="pdfFile" accept="application/pdf">
        </div>

        <div id="workSection" class="work-section" style="display:none;">

            <div class="work-header">
                <div>
                    <h1>Translate PDF</h1>
                    <p>Preview first page, run OCR and translate extracted text.</p>
                </div>

                <label for="pdfFile" class="change-file-btn">
                    Change PDF
                </label>
            </div>

            <div class="preview-options-grid">

                <div class="pdf-preview-box">
                    <h3>PDF Preview</h3>

                    <div class="pdf-preview">
                        <canvas id="previewCanvas"></canvas>
                    </div>

                    <div class="file-info" id="fileInfo">
                        No PDF selected
                    </div>
                </div>

                <div class="options-box">
                    <h3>Translate Options</h3>

                    <label>Pages</label>
                    <input 
                        type="text" 
                        id="pageInput" 
                        placeholder="Example: all or 1-3, 5"
                        value="1"
                    >

                    <small>
                        For faster translation, select limited pages first.
                    </small>

                    <label>Translate To</label>
                    <select id="targetLang">
                        <option value="gujarati">Gujarati</option>
                        <option value="hindi">Hindi</option>
                    </select>

                    <button id="translateBtn" class="main-btn">
                        Run OCR & Translate
                    </button>

                    <label>Original Text</label>
                    <textarea 
                        id="originalText" 
                        placeholder="Original OCR text will appear here..."
                    ></textarea>

                    <label>Translated Text</label>
                    <textarea 
                        id="translatedText" 
                        placeholder="Translated text will appear here..."
                    ></textarea>

                    <button id="copyBtn" class="secondary-btn">
                        Copy Translated Text
                    </button>

                    <button id="downloadTextBtn" class="secondary-btn">
                        Download Translated Text
                    </button>

                    <div id="statusText" class="status-text"></div>
                </div>

            </div>

        </div>

    </div>

</section>

<script src="translate-pdf.js?v=20"></script>

</body>
</html>
