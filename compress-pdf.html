<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compress PDF - PDFSmart Tools</title>

    <link rel="stylesheet" href="compress-pdf.css?v=20">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>

<header class="topbar">
    <div class="logo">📄 PDFSmart Tools</div>
    <a href="index.html" class="home-btn">← Back to Home</a>
</header>

<section class="compress-layout">

    <div class="compress-card">

        <div id="uploadSection" class="upload-section">
            <h1>Compress PDF</h1>
            <p>Select PDF file and reduce file size where possible.</p>

            <label for="pdfFile" class="upload-area">
                <div class="upload-icon">📤</div>
                <h2>Choose PDF File</h2>
                <p>Select one PDF file</p>
            </label>

            <input type="file" id="pdfFile" accept="application/pdf">
        </div>

        <div id="workSection" class="work-section" style="display:none;">

            <div class="work-header">
                <div>
                    <h1>Compress PDF</h1>
                    <p>Preview your PDF and choose compression level.</p>
                </div>

                <label for="pdfFile" class="change-file-btn">
                    Change PDF
                </label>
            </div>

            <div class="preview-options-grid">

                <div class="pdf-preview-box">
                    <h3>PDF Preview</h3>
                    <div class="pdf-preview">
                        <canvas id="previewCanvas"></canvas>
                    </div>
                    <div class="file-info" id="fileInfo">
                        No PDF selected
                    </div>
                </div>

                <div class="options-box">
                    <h3>Compression Options</h3>

                    <label class="radio-card">
                        <input type="radio" name="compressLevel" value="low" checked>
                        <div>
                            <strong>Low Compression</strong>
                            <span>Better quality, smaller reduction</span>
                        </div>
                    </label>

                    <label class="radio-card">
                        <input type="radio" name="compressLevel" value="medium">
                        <div>
                            <strong>Medium Compression</strong>
                            <span>Balanced quality and size</span>
                        </div>
                    </label>

                    <label class="radio-card">
                        <input type="radio" name="compressLevel" value="high">
                        <div>
                            <strong>High Compression</strong>
                            <span>Maximum reduction where possible</span>
                        </div>
                    </label>

                    <button id="compressBtn" class="compress-btn">
                        Compress & Download PDF
                    </button>

                    <div id="statusText" class="status-text"></div>
                </div>

            </div>

        </div>

    </div>

</section>

<script src="compress-pdf.js?v=20"></script>

</body>
</html>
