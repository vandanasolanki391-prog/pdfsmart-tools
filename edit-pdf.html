<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit PDF - PDFSmart Tools</title>

    <link rel="stylesheet" href="edit-pdf.css?v=31" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>

<body>

<header class="topbar">
    <div class="logo">📄 PDFSmart Tools</div>
    <a href="index.html" class="home-btn">← Back to Home</a>
</header>

<section class="upload-screen" id="uploadScreen">
    <div class="upload-card">
        <h1>Edit PDF</h1>
        <p>Upload PDF and add text, eraser, image, shapes, watermark and page number.</p>

        <label for="pdfUpload" class="upload-btn">
            📤 Choose PDF File
        </label>

        <input type="file" id="pdfUpload" accept="application/pdf" />
    </div>
</section>

<section class="editor-screen hidden" id="editorScreen">

    <aside class="left-tools">
        <h3>Tools</h3>

        <button id="addTextBtn">Add Text</button>
        <button id="editBoxBtn">Edit Text Box</button>
        <button id="eraserBtn">White Eraser</button>

        <button id="drawBtn">Draw</button>
        <button id="highlightBtn">Highlight</button>

        <button id="shapesBtn">Shapes ▾</button>
        <div class="shape-menu" id="shapeMenu">
            <button id="rectBtn">Rectangle</button>
            <button id="circleBtn">Circle</button>
            <button id="lineBtn">Line</button>
            <button id="arrowBtn">Arrow</button>
        </div>

        <button id="imageBtn">Add Image</button>
        <button id="signatureBtn">Signature</button>

        <button id="watermarkBtn">Watermark</button>
        <button id="pageNumberBtn">Page Number</button>
        <button id="clearPageBtn">Clear Selected Page</button>
    </aside>

    <main class="workspace">

        <div class="status-bar" id="statusBar">
            Upload PDF to start editing.
        </div>

        <div class="preview-card">
            <div class="preview-header">
                <strong>PDF Preview</strong>
                <button id="downloadBtn" class="download-btn">Download PDF</button>
            </div>

            <div class="pdf-stage" id="pdfStage">
                <!-- All PDF pages will be rendered here -->
            </div>
        </div>

    </main>

    <aside class="right-panel">
        <h3>Options</h3>

        <div class="option-box">
            <h4>Text</h4>

            <label>Font</label>
            <select id="fontFamily">
                <option value="Arial">Arial</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Calibri">Calibri</option>
                <option value="Verdana">Verdana</option>
                <option value="Georgia">Georgia</option>
            </select>

            <label>Font Size</label>
            <input type="number" id="fontSize" value="20" />

            <label>Text Color</label>
            <input type="color" id="textColor" value="#000000" />

            <label>Background</label>
            <input type="color" id="textBg" value="#ffffff" />

            <div class="format-row">
                <button id="boldBtn">B</button>
                <button id="italicBtn"><i>I</i></button>
                <button id="underlineBtn"><u>U</u></button>
                <button id="supBtn">X²</button>
                <button id="subBtn">X₂</button>
            </div>
        </div>

        <div class="option-box">
            <h4>Draw</h4>

            <label>Draw Color</label>
            <input type="color" id="drawColor" value="#ff0000" />

            <label>Brush Size</label>
            <input type="range" id="brushSize" min="1" max="25" value="3" />
        </div>

        <div class="option-box">
            <h4>Image</h4>

            <label>Image Size</label>
            <input type="range" id="imageSize" min="50" max="500" value="150" />
        </div>

        <div class="option-box">
            <h4>Shape</h4>

            <label>Shape Color</label>
            <input type="color" id="shapeColor" value="#ff0000" />

            <label>Border Size</label>
            <input type="range" id="shapeBorder" min="1" max="12" value="4" />

            <label>Shape Size</label>
            <input type="range" id="shapeSize" min="40" max="400" value="150" />
        </div>

        <div class="option-box">
            <h4>Watermark</h4>

            <label>Text</label>
            <input type="text" id="watermarkText" value="PDFSmart Tools" />

            <label>Color</label>
            <input type="color" id="watermarkColor" value="#808080" />

            <label>Size</label>
            <input type="number" id="watermarkSize" value="60" />

            <label>Opacity</label>
            <input type="range" id="watermarkOpacity" min="10" max="100" value="20" />
        </div>

        <button id="undoBtn" class="undo-btn">Undo</button>
    </aside>

</section>

<input type="file" id="imageUpload" accept="image/*" hidden />

<script src="edit-pdf.js?v=31"></script>

</body>
</html>
