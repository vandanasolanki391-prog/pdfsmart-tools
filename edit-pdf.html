<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit PDF - PDFSmart Tools</title>

    <link rel="stylesheet" href="edit-pdf.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>

<body>

<header class="topbar">
    <div class="logo">📄 PDFSmart Tools</div>
    <a href="index.html" class="home-btn">← Back to Home</a>
</header>

<section class="editor-layout">

    <aside class="sidebar">
        <h3>PDF Tools</h3>

        <button>Add Text</button>
        <button>Draw</button>
        <button>Highlight</button>
        <button>Add Image</button>
        <button>Signature</button>
        <button>Watermark</button>
        <button>Rotate Page</button>
        <button>Delete Page</button>
        <button>Page Number</button>
        <button>OCR Scan</button>
        <button>Translate PDF</button>
        <button id="eraseBtn">Erase / Delete Selected</button>
    </aside>

    <main class="main-area">

        <div class="upload-box">
            <h1>Edit PDF Tool</h1>
            <p>Upload your PDF and start editing with smart tools.</p>

            <label for="pdfUpload" class="upload-label">
                📤 Choose PDF File
            </label>

            <input type="file" id="pdfUpload" accept="application/pdf" />
        </div>

        <div class="preview-box">
            <div class="preview-header">
                <span>PDF Preview</span>

                <button class="download-btn" id="downloadBtn">
                    Download PDF
                </button>
            </div>

            <div class="pdf-preview">
                <canvas id="pdfCanvas"></canvas>
            </div>
        </div>

    </main>

    <aside class="properties">
    <h3>Properties</h3>

    <label>Font Size</label>
    <input type="number" id="textFontSize" value="20" />

    <label>Text Color</label>
    <input type="color" id="textColor" value="#000000" />
    
    <label>Text Background</label>
    <input type="color" id="textBgColor" value="#ffffff" />    
   

    <label>Draw Color</label>
    <input type="color" id="drawColor" value="#ff0000" />

    <label>Brush Size</label>
    <input type="range" id="brushSize" min="1" max="20" value="3" />
    <label>Image / Signature Size</label>
    <input type="range" id="imageSize" min="50" max="500" value="150" />    

    <button id="undoBtn" class="download-btn" style="margin-top:20px; width:100%;">
        Undo
    </button>

    <hr style="margin:25px 0;">

    <h3>Page Number</h3>

    <label>Position</label>
    <select id="pageNumberPosition">
        <option value="bottom-center">Bottom Center</option>
        <option value="bottom-right">Bottom Right</option>
        <option value="bottom-left">Bottom Left</option>
        <option value="top-center">Top Center</option>
        <option value="top-right">Top Right</option>
        <option value="top-left">Top Left</option>
    </select>

    <label>Format</label>
    <select id="pageNumberFormat">
        <option value="number">1</option>
        <option value="page-number">Page 1</option>
        <option value="number-of-total">1 of 1</option>
        <option value="page-number-of-total">Page 1 of 1</option>
    </select>

    <label>Start Number</label>
    <input type="number" id="pageStartNumber" value="1" />

    <label>Number Color</label>
    <input type="color" id="pageNumberColor" value="#000000" />

    <label>Number Size</label>
    <input type="number" id="pageNumberSize" value="18" />

    <hr style="margin:25px 0;">

    <h3>Watermark</h3>

    <label>Watermark Text</label>
    <input type="text" id="watermarkText" value="PDFSmart Tools" />

    <label>Watermark Color</label>
    <input type="color" id="watermarkColor" value="#808080" />

    <label>Watermark Size</label>
    <input type="number" id="watermarkSize" value="60" />

    <label>Opacity</label>
    <input type="range" id="watermarkOpacity" min="10" max="100" value="18" />

    <label>Rotation</label>
    <input type="range" id="watermarkRotation" min="-90" max="90" value="-30" />
</aside>

</section>

<input type="file" id="imageUpload" accept="image/*" hidden>

<script src="edit-pdf.js"></script>

</body>
</html>
