<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watermark PDF - PDFSmart Tools</title>

    <link rel="stylesheet" href="watermark-pdf.css?v=20">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>

<header class="topbar">
    <div class="logo">📄 PDFSmart Tools</div>
    <a href="index.html" class="home-btn">← Back to Home</a>
</header>

<section class="watermark-layout">

    <div class="watermark-card">

        <div id="uploadSection" class="upload-section">
            <h1>Watermark PDF</h1>
            <p>Select PDF file and add text watermark to all or selected pages.</p>

            <label for="pdfFile" class="upload-area">
                <div class="upload-icon">📤</div>
                <h2>Choose PDF File</h2>
                <p>Select one PDF file</p>
            </label>

            <input type="file" id="pdfFile" accept="application/pdf">
        </div>

        <div id="workSection" class="work-section" style="display:none;">

            <div class="work-header">
                <div>
                    <h1>Watermark PDF</h1>
                    <p>Preview first page and apply watermark.</p>
                </div>

                <label for="pdfFile" class="change-file-btn">
                    Change PDF
                </label>
            </div>

            <div class="preview-options-grid">

                <div class="pdf-preview-box">
                    <h3>PDF Preview</h3>

                    <div class="pdf-preview">
                        <canvas id="previewCanvas"></canvas>
                    </div>

                    <div class="file-info" id="fileInfo">
                        No PDF selected
                    </div>
                </div>

                <div class="options-box">
                    <h3>Watermark Options</h3>

                    <label>Watermark Text</label>
                    <input 
                        type="text" 
                        id="watermarkText" 
                        value="PDFSmart Tools"
                    >

                    <label>Pages</label>
                    <input 
                        type="text" 
                        id="pageInput" 
                        placeholder="Example: all or 1-3, 5"
                        value="all"
                    >

                    <small>
                        Use <b>all</b> for all pages, or enter pages like 1-3, 5.
                    </small>

                    <label>Watermark Color</label>
                    <input type="color" id="watermarkColor" value="#808080">

                    <label>Font Size</label>
                    <input type="number" id="fontSize" value="60">

                    <label>Opacity</label>
                    <input type="range" id="opacity" min="10" max="100" value="20">

                    <label>Rotation</label>
                    <select id="rotation">
                        <option value="-45">Diagonal Left (-45°)</option>
                        <option value="45">Diagonal Right (45°)</option>
                        <option value="0">Horizontal (0°)</option>
                        <option value="90">Vertical (90°)</option>
                    </select>

                    <label>Position</label>
                    <select id="position">
                        <option value="center">Center</option>
                        <option value="top">Top</option>
                        <option value="bottom">Bottom</option>
                    </select>

                    <button id="watermarkBtn" class="watermark-btn">
                        Add Watermark & Download PDF
                    </button>

                    <div id="statusText" class="status-text"></div>
                </div>

            </div>

        </div>

    </div>

</section>

<script src="watermark-pdf.js?v=20"></script>

</body>
</html>
