<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split PDF - PDFSmart Tools</title>

    <link rel="stylesheet" href="split-pdf.css">

    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>

<header class="topbar">
    <div class="logo">📄 PDFSmart Tools</div>
    <a href="index.html" class="home-btn">← Back to Home</a>
</header>

<section class="split-layout">

    <div class="split-card">

        <h1>Split PDF</h1>
        <p>Extract selected pages or page ranges from your PDF.</p>

        <label for="pdfFile" class="upload-area">
            <div class="upload-icon">📤</div>
            <h2>Choose PDF File</h2>
            <p>Select one PDF file to split</p>
        </label>

        <input type="file" id="pdfFile" accept="application/pdf">

        <div class="file-info" id="fileInfo">
            No PDF selected
        </div>

        <div class="options-box">

            <h3>Split Options</h3>

            <label>Select Mode</label>
            <select id="splitMode">
                <option value="range">Page Range</option>
                <option value="specific">Specific Pages</option>
            </select>

            <label>Pages</label>
            <input 
                type="text" 
                id="pageInput" 
                placeholder="Example: 1-3 or 1,3,5"
            >

            <small>
                Range example: 1-3 &nbsp; | &nbsp; Specific pages: 1,3,5
            </small>

        </div>

        <button id="splitBtn" class="split-btn">
            Split & Download PDF
        </button>

        <div id="statusText" class="status-text"></div>

    </div>

</section>

<script src="split-pdf.js"></script>

</body>
</html>
